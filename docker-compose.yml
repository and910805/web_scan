version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-security_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh /app/backend/scripts/start-web.sh
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - scanner_bin:/app/bin
      - media_data:/app/media
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh /app/backend/scripts/start-worker.sh
    env_file:
      - .env
    volumes:
      - .:/app
      - scanner_bin:/app/bin
      - media_data:/app/media
    depends_on:
      - db
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - web

volumes:
  postgres_data:
  scanner_bin:
  media_data:
